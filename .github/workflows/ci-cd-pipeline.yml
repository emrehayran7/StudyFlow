name: StudyFlow API CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: StudyFlow

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore StudyFlow.slnx

      - name: Build solution
        run: dotnet build StudyFlow.slnx --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test StudyFlow.Test/StudyFlow.Test.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build

      - name: Publish API
        if: github.event_name == 'push'
        run: dotnet publish StudyFlow.Api/StudyFlow.Api.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ./publish

      - name: Upload API artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: studyflow-api
          path: ./publish

  deploy:
    name: Deploy to Azure App Service
    runs-on: windows-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: studyflow-api
          path: ./publish

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
